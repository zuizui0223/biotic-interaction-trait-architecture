name: Probe Impatiens public Dryad data

on:
  pull_request:
    paths:
      - "scripts/probe_dryad_public_dataset.py"
      - "tests/test_probe_dryad_public_dataset.py"
      - ".github/workflows/probe-impatiens-dryad.yml"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Probe Dryad metadata and file headers
        run: |
          python scripts/probe_dryad_public_dataset.py \
            10.5061/dryad.0j96d17 \
            artifacts/impatiens_dryad_probe

      - uses: actions/upload-artifact@v4
        with:
          name: impatiens-dryad-public-data-probe
          path: artifacts/impatiens_dryad_probe/
          if-no-files-found: error
