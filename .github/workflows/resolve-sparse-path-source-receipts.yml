name: Resolve sparse-path source receipts

on:
  pull_request:
    paths:
      - "trait_architecture/public_repository_resolver.py"
      - "scripts/resolve_public_repository_receipts.py"
      - "empirical/matched_flower_regime/sparse_path_source_queue.csv"
      - ".github/workflows/resolve-sparse-path-source-receipts.yml"
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Resolve public repository receipts
        run: |
          python scripts/resolve_public_repository_receipts.py \
            empirical/matched_flower_regime/sparse_path_source_queue.csv \
            artifacts/sparse_path_source_receipts \
            --endpoint-timeout-seconds 8

      - uses: actions/upload-artifact@v4
        with:
          name: sparse-path-source-receipts
          path: artifacts/sparse_path_source_receipts/
          if-no-files-found: error
