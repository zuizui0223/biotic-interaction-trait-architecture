name: Probe title-validated Dryad manifests

on:
  pull_request:
    paths:
      - "trait_architecture/title_validated_dryad_manifest.py"
      - "scripts/probe_title_validated_dryad_manifests.py"
      - "empirical/four_path_effects/title_validated_dataset_targets.csv"
      - ".github/workflows/probe-title-validated-dryad-manifests.yml"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Probe title-validated Dryad manifests
        run: |
          python scripts/probe_title_validated_dryad_manifests.py \
            empirical/four_path_effects/title_validated_dataset_targets.csv \
            artifacts/title_validated_dryad_manifests

      - uses: actions/upload-artifact@v4
        with:
          name: title-validated-dryad-manifests
          path: artifacts/title_validated_dryad_manifests/
          if-no-files-found: error
