name: Probe BIEN floral trait catalog

on:
  pull_request:
    paths:
      - "scripts/probe_bien_floral_traits.R"
      - ".github/workflows/probe-bien-floral-traits.yml"
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install BIEN and JSON dependencies
        run: |
          Rscript -e 'install.packages(c("BIEN", "jsonlite"), repos = "https://cloud.r-project.org")'
      - name: Probe live BIEN trait catalog
        run: Rscript scripts/probe_bien_floral_traits.R artifacts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bien-floral-trait-probe
          path: artifacts/
          if-no-files-found: warn
