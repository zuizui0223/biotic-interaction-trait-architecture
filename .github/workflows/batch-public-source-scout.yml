name: Batch public-source scout

on:
  pull_request:
    paths:
      - "scripts/harvest_openalex_matched_flower_seeds.py"
      - "scripts/batch_scout_public_sources.py"
      - "trait_architecture/batch_public_source_scout.py"
      - "trait_architecture/public_article_source_scout.py"
      - "empirical/matched_flower_regime/literature_seed_queries.csv"
      - "empirical/matched_flower_regime/BATCH_PUBLIC_SOURCE_SCOUT_PROTOCOL.md"
      - "tests/test_batch_scout_public_sources.py"
      - ".github/workflows/batch-public-source-scout.yml"
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum candidate rows with DOI to scout; 0 means all"
        required: true
        default: "0"
      results_per_query:
        description: "OpenAlex works per seed query"
        required: true
        default: "50"

jobs:
  batch_scout:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Rebuild broad candidate universe
        run: |
          python scripts/harvest_openalex_matched_flower_seeds.py \
            empirical/matched_flower_regime/literature_seed_queries.csv \
            artifacts/matched_flower_seed_harvest \
            --results-per-query "${{ github.event.inputs.results_per_query || '50' }}" \
            --shortlist-per-route 15

      - name: Resolve scout limit
        id: resolve_limit
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "limit=${{ github.event.inputs.limit }}" >> "$GITHUB_OUTPUT"
          else
            echo "limit=10" >> "$GITHUB_OUTPUT"
          fi

      - name: Run broad shallow public-source scout
        run: |
          python scripts/batch_scout_public_sources.py \
            artifacts/matched_flower_seed_harvest/openalex_matched_flower_all_candidates.csv \
            artifacts/matched_flower_batch_public_sources \
            --limit "${{ steps.resolve_limit.outputs.limit }}" \
            --sleep-seconds 0.05

      - uses: actions/upload-artifact@v4
        with:
          name: matched-flower-batch-public-source-scout
          path: artifacts/
          if-no-files-found: error
